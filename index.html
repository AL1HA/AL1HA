<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Робототехника — презентация</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
  color: white;
  touch-action: manipulation; /* убирает "качание" */
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
  opacity: 0;
  transform: translateX(100%);
  transition: transform 0.6s ease, opacity 0.6s ease;
}

.slide.active {
  opacity: 1;
  transform: translateX(0);
  z-index: 2;
}

.slide.prev {
  transform: translateX(-100%);
  opacity: 0;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
  max-width: 700px;
}

h1 {
  font-size: 2.8em;
  margin-bottom: 15px;
  background: linear-gradient(90deg, #00f5ff, #7b2cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  font-size: 1.2em;
  opacity: 0.9;
}

img {
  width: 220px;
  margin-top: 15px;
  border-radius: 14px;
}

.progress {
  position: fixed;
  bottom: 0;
  left: 0;
  height: 4px;
  background: linear-gradient(90deg, #00f5ff, #7b2cff);
  transition: width 0.4s;
}

.fullscreen-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  backdrop-filter: blur(10px);
}

.rotate-hint {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: #000;
  z-index: 10;
  font-size: 1.5em;
}

@media (orientation: portrait) {
  .rotate-hint {
    display: flex;
  }
}

  </style>
</head>
<body><div class="rotate-hint">Поверни телефон горизонтально 📱➡️</div><button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<div class="slide active">
  <div class="card">
    <h1>Робототехника</h1>
    <p>Будущее технологий уже здесь 🤖</p>
  </div>
</div><div class="slide">
  <div class="card">
    <h1>Что это?</h1>
    <p>Программирование + механика + электроника.</p>
    <img src="https://images.unsplash.com/photo-1581091870622-6c0f4d2c0f39">
  </div>
</div><div class="slide">
  <div class="card">
    <h1>Будущее</h1>
    <p>ИИ и автономные роботы изменят мир.</p>
    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
  </div>
</div><div class="progress" id="progress"></div><script>
  const slides = document.querySelectorAll('.slide');
  const progress = document.getElementById('progress');
  let current = 0;

  function update() {
    slides.forEach((s, i) => {
      s.classList.remove('active', 'prev');
      if (i === current) s.classList.add('active');
      else if (i < current) s.classList.add('prev');
    });
    progress.style.width = ((current + 1) / slides.length * 100) + '%';
  }

  function next() {
    current = (current + 1) % slides.length;
    update();
  }

  function prev() {
    current = (current - 1 + slides.length) % slides.length;
    update();
  }

  document.addEventListener('click', next);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
  });

  // fullscreen
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  update();
</script></body>
</html>
